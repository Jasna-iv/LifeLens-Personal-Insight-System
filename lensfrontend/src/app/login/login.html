<div class="login-page">

  <div class="login-container">
    <h2>Login</h2>

    <form (ngSubmit)="onLogin()">

      <!-- USERNAME -->
      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text"
               [(ngModel)]="username"
               name="username"
               placeholder="Username"
               required>
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>

        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="password"
               name="password"
               placeholder="Password"
               required>

        <span class="toggle-icon" (click)="togglePassword($event)">
          <i [class]="showPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
        </span>
      </div>

      <!-- ERROR -->
      <div *ngIf="error" class="error-msg">
        {{ error }}
      </div>

      <!-- OPTIONS -->
      <div class="options">
        <div>
          <input type="checkbox" [(ngModel)]="rememberMe" name="remember">
          <label>Remember me</label>
        </div>

        <a (click)="goForgotPassword()">Forgot password?</a>
      </div>
      <button type="submit" [disabled]="loading" class="login-btn">
        <span class="btn-content">
          {{ loading ? 'Logging in...' : 'Login' }}

          <span *ngIf="loading" class="btn-loader"></span>
        </span>
      </button>

    </form>

    <p>Don't have an account? <a routerLink="/signup">SignUp</a></p>
  </div>

</div>
