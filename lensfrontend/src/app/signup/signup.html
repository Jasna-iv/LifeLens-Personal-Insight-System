<div class="signup-container">

  <div class="signup-box">

    <!-- 🔥 SHOW POPUP INSTEAD OF FORM -->
    <div *ngIf="showPopup" class="popup-center">
      {{ popupMessage }}
    </div>

    <!-- 🔥 FORM (HIDDEN WHEN POPUP SHOWS) -->
    <div *ngIf="!showPopup">

      <h2>Create Account</h2>
      <p>Sign up to continue</p>

      <form #f="ngForm" (ngSubmit)="signup()">

        <input type="text"
               [(ngModel)]="username"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               [(ngModel)]="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               [(ngModel)]="password"
               name="password"
               placeholder="Password"
               required>

        <input type="password"
               [(ngModel)]="confirmPassword"
               name="confirmPassword"
               placeholder="Confirm Password"
               required>

        <button type="submit">
          {{ loading ? 'Creating...' : 'Sign Up' }}
        </button>

      </form>

      <p class="error" *ngIf="error">{{ error }}</p>

      <div class="back-login">
        <a (click)="goToLogin()">← Back to Login</a>
      </div>

    </div>

  </div>

</div>
